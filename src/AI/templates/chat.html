<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 500px;
            height: 600px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px 15px 0 0;
        }

        .chatbox {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        .chatbox p {
            margin-bottom:25px;
            font-size: 14px;
        }

        .chat-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            margin-bottom: 10px;
        }

        .user-bubble {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .bot-bubble {
            background-color: #ebebeb;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
            padding: 10px;
            background-color: #ffffff;
        }

        .chat-input input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 10px 15px;
            font-size: 16px;
            outline: none;
        }

        .chat-input button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .chat-input button:hover {
            background-color: #0056b3;
        }

        .chatbox::-webkit-scrollbar {
            width: 8px;
        }

        .chatbox::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chatbox::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .chatbox::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 95%;
                height: 90%;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        ChatBot Assistant
    </div>
    <div class="chatbox" id="chatbox">
        <!-- Chat messages will appear here -->
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendButton">Send</button>
    </div>
</div>

<script>
    document.getElementById('sendButton').onclick = function () {
        sendMessage();
    };

    document.getElementById('userInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    function sendMessage() {
        var userInput = document.getElementById('userInput').value;
        var chatbox = document.getElementById('chatbox');

        if (userInput.trim() === "") {
            return;
        }

        // Add the user's message to the chatbox as a user bubble
        chatbox.innerHTML += "<p><span class='chat-bubble user-bubble'><b>You:</b> " + userInput + "</span></p>";
        chatbox.scrollTop = chatbox.scrollHeight;  // Scroll to the bottom of the chatbox

        // Send the user input to the server (Flask backend)
        fetch('/get', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: 'msg=' + encodeURIComponent(userInput)
        })
        .then(response => response.json())
        .then(data => {
            // Add the bot's response to the chatbox as a bot bubble
            chatbox.innerHTML += "<p><span class='chat-bubble bot-bubble'><b>Bot:</b> " + data.response + "</span></p>";
            chatbox.scrollTop = chatbox.scrollHeight;  // Scroll to the bottom of the chatbox
        });

        // Clear the input field after sending
        document.getElementById('userInput').value = '';
    }
</script>

</body>
</html>
